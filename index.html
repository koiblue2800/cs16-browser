<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter-Strike 1.6</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: white; }
    #canvas { width: 100%; height: 100%; display: block; }
    #loading { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    #loading h1 { font-size: 2rem; margin-bottom: 1rem; color: #ff6600; }
    #progress-bar { width: 300px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 0.5rem; }
    #progress-fill { height: 100%; background: #ff6600; width: 0%; transition: width 0.3s; }
    #status { font-size: 0.85rem; color: #aaa; }
    #fullscreen-btn { margin-top: 1rem; padding: 0.5rem 1.5rem; background: #ff6600; color: white; border: none; cursor: pointer; font-size: 0.9rem; border-radius: 4px; display: none; }
  </style>
</head>
<body>
  <div id="loading">
    <h1>Counter-Strike 1.6</h1>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="status">Downloading game assets...</div>
    <button id="fullscreen-btn" onclick="document.getElementById('canvas').requestFullscreen()">Go Fullscreen</button>
  </div>
  <canvas id="canvas"></canvas>

  <script type="module">
    import { Xash3D } from 'https://esm.sh/xash3d-fwgs@latest'

    const status = document.getElementById('status')
    const fill = document.getElementById('progress-fill')
    const loading = document.getElementById('loading')
    const btn = document.getElementById('fullscreen-btn')

    status.textContent = 'Downloading game assets...'

    // Download valve.zip from GitHub LFS
    const ZIP_URL = 'https://media.githubusercontent.com/media/koiblue2800/cs16-browser/main/valve.zip'
    const response = await fetch(ZIP_URL)
    const contentLength = response.headers.get('content-length')
    const total = parseInt(contentLength, 10)
    let received = 0
    const chunks = []
    const reader = response.body.getReader()

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      chunks.push(value)
      received += value.length
      if (total) {
        const pct = Math.round((received / total) * 100)
        fill.style.width = pct + '%'
        status.textContent = `Downloading... ${pct}%`
      }
    }

    status.textContent = 'Loading engine...'
    fill.style.width = '100%'

    const blob = new Blob(chunks)
    const arrayBuffer = await blob.arrayBuffer()

    const x = new Xash3D({
      canvas: document.getElementById('canvas'),
      arguments: ['-game', 'cstrike'],
      zip: arrayBuffer,
    })

    await x.init()
    loading.style.display = 'none'
    btn.style.display = 'inline-block'
    x.main()
    x.Cmd_ExecuteString('map de_dust2')
  </script>
</body>
</html>
